<html>
    <head>
        <link rel="stylesheet" href="./style/style.css">
    </head>
    <body>
        <fieldset>
            <legend>Student Information</legend>
            <table>
               <tr>
                <td>
                    <label for="fullname">Full Name (Text)</label> <br>
                    <input type="text" id="email" placeholder="Enter your full name">
                </td>
                <td>
                    <label for="emailaddress">Email Address</label> <br>
                    <input type="text" id="address" placeholder="your email@example.com">
                </td>
               </tr>
               <tr>
                <td>
                    <label for="password">Password</label> <br>
                    <input type="text" id="password" placeholder="Enter secure password">
                </td>
                <td>
                    <label for="age">Age (Number)</label> <br>
                    <input type="text" id="age" placeholder="Enter your age">
                </td>
               </tr>
               <tr>
                <td>
                    <label for="date">Experiment Date</label> <br>
                    <input type="text"  id="date" placeholder="mm/dd/yyyy">
                </td>
                <td>
                    <label for="phonenmbr">Phone Number</label> <br>
                    <input type="text"  id="number" placeholder="+880 XXXX XXXXXX">
                </td>
               </tr>
            </table>

        </fieldset>
        
        <button id="submit">SUBMIT</button>
        <button id="clear">CLEAR</button>
    </body>
</html>
